name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Certifique-se de que sua branch principal se chama main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    env:
      VITE_ANALYTICS_WEB_APP_URL: ${{ vars.VITE_ANALYTICS_WEB_APP_URL }}
      VITE_ANALYTICS_TOKEN: ${{ vars.VITE_ANALYTICS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate analytics env
        run: |
          if [ -z "$VITE_ANALYTICS_WEB_APP_URL" ]; then
            echo "VITE_ANALYTICS_WEB_APP_URL nao definido em Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi
          if [ -z "$VITE_ANALYTICS_TOKEN" ]; then
            echo "VITE_ANALYTICS_TOKEN nao definido em Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
